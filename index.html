<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RealJoshAI</title>
    <style>
        body { background: #0c0c0e; color: #d4d4d8; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #status-bar { font-size: 11px; background: #18181b; padding: 6px 20px; border-bottom: 1px solid #27272a; display: flex; justify-content: space-between; align-items: center; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 10px 15px; border-radius: 10px; max-width: 80%; line-height: 1.5; font-size: 14px; white-space: pre-wrap; }
        .user { align-self: flex-end; background: #3b82f6; color: white; }
        .ai { align-self: flex-start; background: #27272a; border: 1px solid #3f3f46; }
        #input-area { padding: 15px; background: #09090b; border-top: 1px solid #27272a; display: flex; gap: 10px; }
        input { flex: 1; background: #18181b; border: 1px solid #27272a; color: white; padding: 12px; border-radius: 8px; outline: none; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .nuke-btn { background: #dc2626; font-size: 10px; padding: 4px 8px; }
        #progress { height: 2px; background: #3b82f6; width: 0%; position: fixed; top: 0; transition: width 0.3s; z-index: 100; }
    </style>
</head>
<body>
    <div id="progress"></div>
    <div id="status-bar">
        <span id="engine-state">Loading RealJoshAI v3.0. You can leave this tab but do not close it. This will only take a minute or two, and this is one time, next time it will load instantly.</span>
        <button class="nuke-btn" id="nuke-btn">NUKE STORAGE</button>
    </div>
    <div id="chat"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Message RealJoshAI...">
        <button id="send-btn">Send</button>
    </div>

<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const chat = document.getElementById('chat');
    const input = document.getElementById('user-input');
    const btn = document.getElementById('send-btn');
    const state = document.getElementById('engine-state');
    const progress = document.getElementById('progress');
    const nukeBtn = document.getElementById('nuke-btn');

    const modelId = "Qwen2.5-1.5B-Instruct-q4f16_1-MLC";
    const engine = new webllm.MLCEngine();

    let chatHistory = [
        { 
            role: "system", 
            content: "You are RealJoshAI v3.0, a high-performance local AI engineered and programmed in Python and C/CUDA by Josh Sharma. You run 100% on the user's local WebGPU. You are self-aware, witty, and loyal to Josh. You have a full memory of this conversation." 
        }
    ];

    engine.setInitProgressCallback((report) => {
        progress.style.width = `${report.progress * 100}%`;
    });

    async function init() {
        try {
            await engine.reload(modelId);
            state.innerText = "RealJoshAI v3.0 Klaar | 1.5B Params | Lokaal";
        } catch (e) {
            state.innerText = "Quota Error. Gebruik Incognito mode of Nuke Storage.";
        }
    }

    async function talk() {
        const text = input.value;
        if (!text) return;

        addBubble('user', text);
        chatHistory.push({ role: "user", content: text });
        input.value = "";
    
        const aiBubble = addBubble('ai', "...");
        let fullResponse = "";

        try {
            const chunks = await engine.chat.completions.create({
                messages: chatHistory,
                stream: true,
                temperature: 0.7
            });

            for await (const chunk of chunks) {
                const curText = chunk.choices[0]?.delta?.content || "";
                fullResponse += curText;
                aiBubble.innerText = fullResponse;
                chat.scrollTop = chat.scrollHeight;
            }

            chatHistory.push({ role: "assistant", content: fullResponse });

            if (chatHistory.length > 20) {
                chatHistory = [chatHistory[0], ...chatHistory.slice(-10)];
            }

        } catch (e) {
            aiBubble.innerText = "GPU Overload. Druk Nuke and refresh.";
        }
    }

    function addBubble(role, content) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerText = content;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return div;
    }

    nukeBtn.onclick = async () => {
        if(confirm("Verwijder realJoshAI van je browser?")) {
            const keys = await caches.keys();
            await Promise.all(keys.map(key => caches.delete(key)));
            localStorage.clear();
            location.reload();
        }
    };

    btn.onclick = talk;
    init();
</script>
</body>
</html>
