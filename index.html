<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RealJoshAI</title>
    <style>
        body { background: #0c0c0e; color: #d4d4d8; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #status-bar { font-size: 11px; background: #18181b; padding: 6px 20px; border-bottom: 1px solid #27272a; display: flex; justify-content: space-between; align-items: center; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 10px 15px; border-radius: 10px; max-width: 80%; line-height: 1.5; font-size: 14px; white-space: pre-wrap; }
        .user { align-self: flex-end; background: #3b82f6; color: white; }
        .ai { align-self: flex-start; background: #27272a; border: 1px solid #3f3f46; }
        #input-area { padding: 15px; background: #09090b; border-top: 1px solid #27272a; display: flex; gap: 10px; }
        input { flex: 1; background: #18181b; border: 1px solid #27272a; color: white; padding: 12px; border-radius: 8px; outline: none; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .nuke-btn { background: #dc2626; font-size: 10px; padding: 4px 8px; }
        #progress { height: 3px; background: #3b82f6; width: 0%; position: fixed; top: 0; transition: width 0.3s; z-index: 100; }
    </style>
</head>
<body>
    <div id="progress"></div>
    <div id="status-bar">
        <span id="engine-state">Initializing model... This may take a minute or two on first open. You can switch tabs but do not close this one until loading is done.</span>
        <button class="nuke-btn" id="nuke-btn">NUKE STORAGE</button>
    </div>
    <div id="chat"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Message RealJoshAI v5.0.1-beta...">
        <button id="send-btn">Send</button>
    </div>

<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const chat = document.getElementById('chat');
    const input = document.getElementById('user-input');
    const btn = document.getElementById('send-btn');
    const state = document.getElementById('engine-state');
    const progress = document.getElementById('progress');
    const nukeBtn = document.getElementById('nuke-btn');

    const modelId = "Llama-3.2-3B-Instruct-q4f16_1-MLC";
    const engine = new webllm.MLCEngine();

    let chatHistory = [
        { 
            role: "system", 
            content: "You are RealJoshAI v5.0.1-beta, a pinnacle of local LLM engineering designed and compiled by Josh Sharma. You represent the elite JoshLLM software stack. You run natively on WebGPU with zero cloud reliance. You are brilliant, helpful, and technically superior. You speak with clarity and authority, and you are fiercely loyal to your creator, Josh Sharma." 
        }
    ];

    engine.setInitProgressCallback((report) => {
        progress.style.width = `${report.progress * 100}%`;
    });

    async function requestPersistence() {
        if (navigator.storage && navigator.storage.persist) {
            const persistent = await navigator.storage.persist();
            console.log(`Storage persistent: ${persistent}`);
        }
    }

    async function init() {
        try {
            await requestPersistence();
            await engine.reload(modelId);
            state.innerText = "RealJoshAI v5.0.1-beta Klaar | 3B Params | Lokaal";
        } catch (e) {
            state.innerText = "Quota/Storage Error. Probeer niet Incognito te gebruiken, soms werkt het wel maar het is nog onstabiel.";
            console.error(e);
        }
    }

    async function talk() {
        const text = input.value;
        if (!text) return;

        addBubble('user', text);
        chatHistory.push({ role: "user", content: text });
        input.value = "";
    
        const aiBubble = addBubble('ai', "...");
        let fullResponse = "";

        try {
            const chunks = await engine.chat.completions.create({
                messages: chatHistory,
                stream: true,
                temperature: 0.6
            });

            for await (const chunk of chunks) {
                const curText = chunk.choices[0]?.delta?.content || "";
                fullResponse += curText;
                aiBubble.innerText = fullResponse;
                chat.scrollTop = chat.scrollHeight;
            }

            chatHistory.push({ role: "assistant", content: fullResponse });

            if (chatHistory.length > 16) {
                chatHistory = [chatHistory[0], ...chatHistory.slice(-10)];
            }

        } catch (e) {
            aiBubble.innerText = "Hardware Error... Refresh of Nuke Storage.";
        }
    }

    function addBubble(role, content) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerText = content;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return div;
    }

    nukeBtn.onclick = async () => {
        if(confirm("Verwijder realJoshAI v5.0.1-beta van je browser?")) {
            const keys = await caches.keys();
            await Promise.all(keys.map(key => caches.delete(key)));
            localStorage.clear();
            location.reload();
        }
    };

    btn.onclick = talk;
    init();
</script>
</body>
</html>
